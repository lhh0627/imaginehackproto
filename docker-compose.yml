services:
  sentinel:
    build: .
    container_name: cloud-sentinel-dashboard
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  bim-render-04:
    image: nginx:alpine
    container_name: bim-render-04
    ports:
      - "8081:80"
    labels:
      sustainability.demo: "true"
      sustainability.autofix: "true"
      sustainability.name: "BIM-Render-04"
      sustainability.role: "Legacy BIM render worker"
      sustainability.project: "Hilti Tower Renovation"
      sustainability.risk: "critical"
      sustainability.issue: "Public HTTP port exposed while the render node is burning idle energy."
      sustainability.energy_kwh_hour: "9.8"
      sustainability.carbon_kg_hour: "4.1"
      sustainability.monthly_cost_usd: "706"
      sustainability.recommendation: "Remove this exposed idle render node and restart it later behind private networking."

  site-data-api:
    image: nginx:alpine
    container_name: site-data-api
    labels:
      sustainability.demo: "true"
      sustainability.autofix: "false"
      sustainability.name: "Site-Data-API"
      sustainability.role: "Construction telemetry API"
      sustainability.project: "Hilti Connected Jobsite"
      sustainability.risk: "low"
      sustainability.issue: "Private API with normal utilization."
      sustainability.energy_kwh_hour: "0.35"
      sustainability.carbon_kg_hour: "0.14"
      sustainability.monthly_cost_usd: "22"
      sustainability.recommendation: "Keep private networking and normal autoscaling policy."

  model-cache:
    image: alpine:3.20
    container_name: model-cache
    command: ["sh", "-c", "sleep infinity"]
    labels:
      sustainability.demo: "true"
      sustainability.autofix: "false"
      sustainability.name: "Model-Cache"
      sustainability.role: "BIM model cache for project drawings"
      sustainability.project: "Hilti Connected Jobsite"
      sustainability.risk: "medium"
      sustainability.issue: "Internal cache is healthy, but storage growth should be watched."
      sustainability.energy_kwh_hour: "1.1"
      sustainability.carbon_kg_hour: "0.43"
      sustainability.monthly_cost_usd: "84"
      sustainability.recommendation: "Apply lifecycle cleanup to old BIM artifacts before the next scan."
